interface:
  display_name: "Anthropic"
  short_description: "Connect Anthropic to Claude, Codex, and ChatGPT through JoAi's hosted MCP app server."
  icon_small: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/anthropic.svg"
  icon_large: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/anthropic.svg"
  brand_color: "#191919"
  default_prompt: "List the Anthropic tools available in this app."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "joai-anthropic"
      description: "Anthropic MCP server by JoAi"
      transport: "streamable_http"
      url: "https://cortex.joai.ai/mcp/apps/anthropic"
